<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Agent OS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col">

<div id="loading" class="text-center p-10 text-xl">
Loading AI Agent OS...
</div>

<div id="app" class="hidden flex flex-col min-h-screen">

<header class="flex items-center justify-between p-3 border-b dark:border-gray-700 bg-white dark:bg-gray-800">

<h1 class="font-bold">AI Agent Workspace</h1>

<div class="flex gap-2">

<button id="runAgents" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">
Run Agents
</button>

<button id="settingsBtn" class="bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded text-sm">
Settings
</button>

<button id="themeBtn" class="bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded text-sm">
🌙
</button>

</div>
</header>

<div class="flex flex-1 overflow-hidden">

<aside class="w-60 border-r dark:border-gray-700 p-3 bg-white dark:bg-gray-800">

<h2 class="font-semibold mb-2">Agents</h2>

<div class="space-y-2 text-sm">

<div>🧠 Planner Agent</div>
<div>🔎 Research Agent</div>
<div>💻 Code Agent</div>
<div>✍ Writer Agent</div>

</div>

</aside>

<main class="flex-1 flex flex-col">

<div id="workspace" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

<div class="p-3 border-t dark:border-gray-700 bg-white dark:bg-gray-800">

<div class="flex gap-2">

<textarea id="taskInput"
rows="2"
class="flex-1 border rounded p-2 text-sm"
placeholder="Enter a task for the AI agents..."></textarea>

<button id="runTask"
class="bg-blue-500 text-white px-4 rounded">
Start
</button>

</div>

</div>

</main>

</div>

</div>

<div id="settingsModal"
class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

<div class="bg-white dark:bg-gray-800 p-6 rounded w-80 space-y-3">

<h2 class="font-bold text-lg">API Settings</h2>

<input id="apiKey"
type="password"
placeholder="OpenRouter API Key"
class="w-full border rounded p-2 text-sm">

<input id="modelName"
placeholder="Model name"
class="w-full border rounded p-2 text-sm">

<button id="saveSettings"
class="bg-blue-500 text-white px-3 py-1 rounded">
Save
</button>

</div>

</div>

<script>

const workspace=document.getElementById("workspace")

let apiKey=localStorage.getItem("apiKey")||""
let model=localStorage.getItem("model")||"deepseek/deepseek-r1:free"

document.getElementById("apiKey").value=apiKey
document.getElementById("modelName").value=model

function addBlock(title,text){

const div=document.createElement("div")

div.className="bg-gray-200 dark:bg-gray-800 p-3 rounded"

div.innerHTML="<h3 class='font-semibold mb-1'>"+title+"</h3>"+marked.parse(text)

workspace.appendChild(div)

workspace.scrollTop=workspace.scrollHeight

return div

}

async function callAI(messages){

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
messages:messages
})
})

const data=await res.json()

return data.choices[0].message.content

}

async function runAgents(){

const task=document.getElementById("taskInput").value.trim()

if(!task)return

workspace.innerHTML=""

const planner=await callAI([
{role:"system",content:"You are an AI task planner."},
{role:"user",content:"Break this task into steps: "+task}
])

addBlock("Planner Agent",planner)

const research=await callAI([
{role:"system",content:"You are a research AI."},
{role:"user",content:"Research this task: "+task}
])

addBlock("Research Agent",research)

const coder=await callAI([
{role:"system",content:"You are a coding AI."},
{role:"user",content:"Provide code or technical solution for: "+task}
])

addBlock("Code Agent",coder)

const writer=await callAI([
{role:"system",content:"You are a professional writer."},
{role:"user",content:"Summarize final output for: "+task}
])

addBlock("Writer Agent",writer)

}

document.getElementById("runTask").onclick=runAgents
document.getElementById("runAgents").onclick=runAgents

document.getElementById("settingsBtn").onclick=()=>{
document.getElementById("settingsModal").classList.remove("hidden")
}

document.getElementById("saveSettings").onclick=()=>{

apiKey=document.getElementById("apiKey").value
model=document.getElementById("modelName").value

localStorage.setItem("apiKey",apiKey)
localStorage.setItem("model",model)

document.getElementById("settingsModal").classList.add("hidden")

}

document.getElementById("themeBtn").onclick=()=>{

document.documentElement.classList.toggle("dark")

localStorage.setItem("theme",
document.documentElement.classList.contains("dark")
?"dark":"light")

}

if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark")
}

document.getElementById("loading").style.display="none"
document.getElementById("app").classList.remove("hidden")

</script>

</body>
</html>
