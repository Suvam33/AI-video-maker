<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI-OS</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->

<div class="w-64 bg-slate-800 p-4">

<h1 class="text-xl font-bold mb-6">AI-OS</h1>

<button onclick="openTool('chat')" class="block w-full text-left py-2">AI Chat</button>

<button onclick="openTool('image')" class="block w-full text-left py-2">Image Studio</button>

<button onclick="openTool('settings')" class="block w-full text-left py-2">System Settings</button>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<!-- TOP BAR -->

<div class="p-3 bg-slate-800 flex justify-between">

<select id="modelSelect" class="bg-slate-700 p-2 rounded">

<option value="openrouter/auto">Auto (Free)</option>

<option value="meta-llama/llama-3-8b-instruct:free">Llama 3 8B (Free)</option>

<option value="google/gemma-7b-it:free">Gemma 7B (Free)</option>

</select>

</div>

<!-- WORKSPACE -->

<div id="workspace" class="flex-1 overflow-y-auto p-6"></div>

<!-- PROMPT BAR -->

<div class="p-4 bg-slate-800 flex gap-2">

<textarea id="prompt" class="flex-1 p-3 rounded text-black" placeholder="Enter prompt"></textarea>

<button onclick="runPrompt()" class="bg-blue-500 px-6 rounded">
Execute
</button>

</div>

</div>

<script>

let currentTool="chat"

let apiKey = localStorage.getItem("OPENROUTER_KEY") || ""

let model = localStorage.getItem("MODEL") || "openrouter/auto"

document.getElementById("modelSelect").value = model

document.getElementById("modelSelect").onchange = e=>{
model = e.target.value
localStorage.setItem("MODEL",model)
}

function openTool(tool){

currentTool = tool

if(tool==="settings"){

workspace.innerHTML=`

<div class="max-w-md">

<h2 class="text-xl mb-3">API Settings</h2>

<input id="apiInput"
value="${apiKey}"
placeholder="OpenRouter API Key"
class="w-full p-2 text-black rounded mb-2">

<button onclick="saveKey()"
class="bg-blue-500 px-4 py-2 rounded">
Save API Key
</button>

</div>
`

return
}

workspace.innerHTML=`<h2 class="text-xl mb-4">${tool}</h2>`

}

function saveKey(){

apiKey=document.getElementById("apiInput").value

localStorage.setItem("OPENROUTER_KEY",apiKey)

alert("API Key Saved")

}

async function runPrompt(){

const prompt=document.getElementById("prompt").value

if(currentTool==="image"){

const img=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`

workspace.innerHTML+=`<img src="${img}" class="mt-4 rounded">`

return

}

if(!apiKey){

alert("Add API key in settings")

return

}

workspace.innerHTML+=`<div class="mb-2 text-green-400">You: ${prompt}</div>`

const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json",
"HTTP-Referer":location.origin,
"X-Title":"AI-OS"
},

body:JSON.stringify({

model:model,

messages:[
{role:"user",content:prompt}
]

})

})

const data = await res.json()

const text = data.choices?.[0]?.message?.content || "Error"

workspace.innerHTML+=`<div class="mb-4 text-blue-400">AI: ${text}</div>`

}

openTool("chat")

</script>

</body>
</html>
