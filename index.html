<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI SUPER STUDIO v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body class="min-h-screen flex flex-col bg-gray-100 dark:bg-gray-900">

<div id="loading" class="text-center p-10 text-xl">
Loading AI SUPER STUDIO...
</div>

<div id="app" class="hidden flex flex-1">

<!-- SIDEBAR -->

<div class="w-64 bg-white dark:bg-gray-800 p-4 border-r">

<h1 class="font-bold mb-4 text-lg">AI SUPER STUDIO</h1>

<div class="space-y-2 text-sm">

<button onclick="openTool('chat')" class="block w-full text-left">AI Chat</button>
<button onclick="openTool('image')" class="block w-full text-left">Image Generator</button>
<button onclick="openTool('video')" class="block w-full text-left">Video Generator</button>
<button onclick="openTool('voice')" class="block w-full text-left">Voice Generator</button>
<button onclick="openTool('music')" class="block w-full text-left">Music Generator</button>
<button onclick="openTool('code')" class="block w-full text-left">AI Coding IDE</button>
<button onclick="openTool('trading')" class="block w-full text-left">Trading Bot Builder</button>
<button onclick="openTool('agents')" class="block w-full text-left">Multi-Agent System</button>
<button onclick="openSettings()" class="block w-full text-left">Settings</button>

</div>

</div>

<!-- WORKSPACE -->

<div class="flex-1 flex flex-col">

<div id="workspace" class="flex-1 overflow-y-auto p-4"></div>

<div class="p-3 border-t bg-white dark:bg-gray-800">

<div class="flex gap-2">

<textarea id="prompt"
rows="2"
class="flex-1 border rounded p-2"
placeholder="Enter prompt..."></textarea>

<button onclick="runPrompt()" class="bg-blue-500 text-white px-4 rounded">
Run
</button>

</div>

</div>

</div>

</div>

<!-- SETTINGS -->

<div id="settingsModal"
class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

<div class="bg-white p-6 rounded w-80">

<h2 class="font-bold mb-2">Settings</h2>

<input id="apiKey"
placeholder="OpenRouter API Key"
class="w-full border p-2 mb-2">

<input id="model"
value="deepseek/deepseek-r1:free"
class="w-full border p-2 mb-2">

<button onclick="saveSettings()" class="bg-blue-500 text-white px-3 py-1 rounded">
Save
</button>

</div>

</div>

<script>

let currentTool="chat"

let apiKey=localStorage.getItem("apiKey")||""
let model=localStorage.getItem("model")||"deepseek/deepseek-r1:free"

document.getElementById("apiKey").value=apiKey
document.getElementById("model").value=model

function openTool(tool){

currentTool=tool

workspace.innerHTML="<h2 class='text-xl font-bold mb-3'>"+tool.toUpperCase()+"</h2>"

if(tool==="code"){
workspace.innerHTML+=`
<textarea id="codeEditor" class="w-full h-64 border p-2">
# Write code or ask AI to generate
</textarea>`
}

}

async function runPrompt(){

const prompt=document.getElementById("prompt").value

if(currentTool==="chat"){
const text=await callAI("You are a helpful AI assistant",prompt)
addBlock("AI",text)
}

if(currentTool==="image"){
const url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)
workspace.innerHTML+=`<img src="${url}" class="mt-4 rounded shadow">`
}

if(currentTool==="video"){
workspace.innerHTML+=`
<div class="p-3 bg-yellow-100 rounded">
Video generation requires external APIs (Runway, Pika, Replicate).
Integrate your API endpoint here.
</div>`
}

if(currentTool==="voice"){
const speech=new SpeechSynthesisUtterance(prompt)
speechSynthesis.speak(speech)
workspace.innerHTML+="Voice playing..."
}

if(currentTool==="music"){
generateMusic()
}

if(currentTool==="code"){
const text=await callAI("You are a senior software engineer",prompt)
document.getElementById("codeEditor").value=text
}

if(currentTool==="trading"){
const text=await callAI(
"You are an expert crypto trading bot developer",
prompt
)
addBlock("Trading Bot Strategy",text)
}

if(currentTool==="agents"){
runAgents(prompt)
}

}

async function runAgents(task){

workspace.innerHTML=""

const planner=await callAI("You are a task planner",task)
addBlock("Planner Agent",planner)

const research=await callAI("You are a research agent",task)
addBlock("Research Agent",research)

const coder=await callAI("You are a coding agent",task)
addBlock("Code Agent",coder)

const writer=await callAI("You summarize results",task)
addBlock("Writer Agent",writer)

}

async function callAI(system,task){

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},

body:JSON.stringify({
model:model,
messages:[
{role:"system",content:system},
{role:"user",content:task}
]
})

})

const data=await res.json()

return data.choices?.[0]?.message?.content||"Error"

}

function addBlock(title,text){

workspace.innerHTML+=`
<div class="bg-gray-200 p-3 rounded mt-3">
<b>${title}</b><br>
${marked.parse(text)}
</div>`

}

function generateMusic(){

const ctx=new AudioContext()

const osc=ctx.createOscillator()

osc.type="sine"

osc.frequency.value=440

osc.connect(ctx.destination)

osc.start()

setTimeout(()=>osc.stop(),2000)

workspace.innerHTML+="Playing generated tone..."

}

function openSettings(){
settingsModal.classList.remove("hidden")
}

function saveSettings(){

apiKey=document.getElementById("apiKey").value
model=document.getElementById("model").value

localStorage.setItem("apiKey",apiKey)
localStorage.setItem("model",model)

settingsModal.classList.add("hidden")

}

document.getElementById("loading").style.display="none"
document.getElementById("app").classList.remove("hidden")

</script>

</body>
</html>
