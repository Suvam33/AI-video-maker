<!DOCTYPE html>

<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI OPERATING SYSTEM</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{font-family:system-ui;background:#030712;color:#e5e7eb}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#374151;border-radius:5px}
.loader{border:3px solid #1f2937;border-top:3px solid #0ea5e9;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>

</head>

<body class="h-screen flex overflow-hidden">

<!-- SIDEBAR -->

<aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
<div class="p-4 font-bold text-lg flex items-center gap-2">
<i class="fa-solid fa-microchip text-sky-400"></i> AI-OS
</div>

<nav id="nav" class="flex-1 overflow-y-auto text-sm"></nav>

<div class="p-4 border-t border-gray-800 text-xs">
Status: <span class="text-green-400">Online</span>
</div>
</aside>

<!-- MAIN -->

<main class="flex-1 flex flex-col">

<header class="h-12 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-6">
<span id="title">AI Chat</span>

<div class="flex items-center gap-3">

<select id="model" class="bg-gray-800 border border-gray-700 text-xs px-2 py-1 rounded">
<option value="openrouter/auto">Auto</option>
<option value="meta-llama/llama-3-8b-instruct:free">Llama3</option>
<option value="google/gemma-7b-it:free">Gemma</option>
</select>

<button onclick="switchTab('settings')">
<i class="fa-solid fa-gear"></i>
</button>

</div>
</header>

<div id="workspace" class="flex-1 overflow-y-auto p-6"></div>

<div class="bg-gray-900 border-t border-gray-800 p-3 flex gap-3">
<textarea id="prompt" rows="2" class="flex-1 bg-gray-800 p-2 rounded"></textarea>
<button onclick="run()" class="bg-sky-500 px-4 rounded">Run</button>
</div>

</main>

<script>

const state={
apiKey:localStorage.getItem("api")||"",
model:"openrouter/auto",
tab:"chat",
history:[]
}

const apps=[
["chat","AI Chat","fa-comments"],
["research","Research Engine","fa-magnifying-glass"],
["image","Image Studio","fa-image"],
["code","AI Coding IDE","fa-code"],
["agents","Autonomous Agents","fa-network-wired"],
["audio","Audio Engine","fa-music"],
["settings","Settings","fa-gear"]
]

const nav=document.getElementById("nav")

apps.forEach(a=>{
const btn=document.createElement("button")
btn.className="w-full text-left px-4 py-3 hover:bg-gray-800"
btn.innerHTML=`<i class="fa ${a[2]} w-5"></i> ${a[1]}`
btn.onclick=()=>switchTab(a[0])
nav.appendChild(btn)
})

function switchTab(t){
state.tab=t
title.innerText=t.toUpperCase()
workspace.innerHTML=""
}

async function callAI(sys,user){

if(!state.apiKey)throw "API key missing"

const r=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+state.apiKey,
"Content-Type":"application/json",
"HTTP-Referer":location.origin,
"X-Title":"AI OS"
},
body:JSON.stringify({
model:state.model,
messages:[
{role:"system",content:sys},
...state.history,
{role:"user",content:user}
]
})
})

const d=await r.json()
const text=d.choices?.[0]?.message?.content||"error"

state.history.push({role:"user",content:user})
state.history.push({role:"assistant",content:text})

return text
}

async function run(){

const p=prompt.value
prompt.value=""

if(state.tab==="chat"){
const r=await callAI("You are an AI OS assistant",p)
workspace.innerHTML+=`<div class="bg-gray-900 p-4 rounded mb-4">${marked.parse(r)}</div>`
}

if(state.tab==="research"){
const r=await callAI("Create a structured research report",p)
workspace.innerHTML=marked.parse(r)
}

if(state.tab==="code"){
const r=await callAI("Generate clean code only",p)
workspace.innerHTML=`<pre class="bg-black p-4 rounded">${r}</pre>`

}

if(state.tab==="image"){
const url="https://image.pollinations.ai/prompt/"+encodeURIComponent(p)
workspace.innerHTML+=`<img src="${url}" class="rounded mb-4">`
}

if(state.tab==="agents"){
runAgents(p)
}

if(state.tab==="audio"){
const u=new SpeechSynthesisUtterance(p)
speechSynthesis.speak(u)
workspace.innerHTML="Speaking..."
}

}

async function runAgents(goal){

workspace.innerHTML="Starting agents...<br>"

const plan=await callAI("Break goal into steps",goal)
workspace.innerHTML+="<b>Planner:</b>"+plan+"<br>"

const research=await callAI("Research context",plan)
workspace.innerHTML+="<b>Research:</b>"+research+"<br>"

const code=await callAI("Create solution",research)
workspace.innerHTML+="<b>Execution:</b>"+code+"<br>"

}

switchTab("chat")

</script>
</body>
</html>
